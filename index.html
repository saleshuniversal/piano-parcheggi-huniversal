<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piano Parcheggio - Hotel Universal</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f4f8; padding: 20px; }
        .container { max-width: 1800px; margin: 0 auto; background: white; border-radius: 12px; box-shadow: 0 4px 20px; overflow: hidden; }
        .header { background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); color: white; padding: 15px 20px; }
        .header h1 { font-size: 26px; }
        .controls { background: white; padding: 15px 20px; border-bottom: 2px solid #e5e7eb; display: flex; gap: 15px; flex-wrap: wrap; }
        .control-group { display: flex; flex-direction: column; gap: 5px; }
        .control-group label { font-size: 12px; font-weight: 600; color: #6b7280; }
        .control-group select, .control-group input { padding: 8px 12px; border: 2px solid #e5e7eb; border-radius: 6px; font-size: 14px; }
        .btn { padding: 10px 20px; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; background: #3b82f6; color: white; }
        .legend { padding: 10px 20px; background: #f9fafb; display: flex; gap: 25px; flex-wrap: wrap; border-bottom: 1px solid #e5e7eb; }
        .legend-item { display: flex; align-items: center; gap: 8px; font-size: 13px; }
        .legend-color { width: 20px; height: 20px; border-radius: 4px; border: 1px solid #d1d5db; }
        .parking-grid { padding: 20px; overflow-x: auto; overflow-y: auto; height: calc(100vh - 250px); }
        table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 11px; }
        th { background: #f3f4f6; padding: 5px 2px; text-align: center; font-weight: 600; border: 1px solid #e5e7eb; position: sticky; top: 0; z-index: 100; width: 35px; height: 35px; }
        th.posto-header { background: #1e3a8a; color: white; min-width: 90px; width: 90px; position: sticky; left: 0; z-index: 101; }
        td { padding: 2px; border: 1px solid #e5e7eb; vertical-align: middle; width: 35px; height: 35px; cursor: pointer; font-size: 8px; position: relative; }
        td:first-child { position: sticky; left: 0; z-index: 10; background: white; }
        .free { background: #d1fae5; }
        .occupied { background: #fee2e2; border-top: 2px solid #dc2626 !important; border-bottom: 2px solid #dc2626 !important; }
        .guest-name { position: absolute; left: 0; right: 0; top: 50%; transform: translateY(-50%); font-size: 7px; font-weight: 700; white-space: nowrap; text-align: center; color: #7f1d1d; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: white; padding: 30px; border-radius: 12px; max-width: 600px; width: 90%; }
        .modal-header { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .modal-header h2 { color: #1e3a8a; }
        .close-modal { background: none; border: none; font-size: 28px; cursor: pointer; color: #6b7280; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 600; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px; border: 2px solid #e5e7eb; border-radius: 6px; }
        .modal-actions { display: flex; gap: 10px; margin-top: 25px; }
        .btn-danger { background: #ef4444; }
        .btn-success { background: #10b981; }
        .btn-cancel { background: #6b7280; }
        .loading { text-align: center; padding: 50px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚗 Piano Parcheggio</h1>
        </div>
        
        <div class="controls">
            <div class="control-group">
                <label>Mese</label>
                <select id="monthSelect"></select>
            </div>
            <div class="control-group">
                <label>Anno</label>
                <select id="yearSelect">
                    <option value="2025">2025</option>
                    <option value="2026" selected>2026</option>
                    <option value="2027">2027</option>
                </select>
            </div>
            <button class="btn" id="btnNew" style="margin-top: 20px;">➕ Nuova</button>
        </div>
        
        <div class="legend">
            <div class="legend-item"><div class="legend-color" style="background: #d1fae5;"></div><span>Libero</span></div>
            <div class="legend-item"><div class="legend-color" style="background: #fee2e2; border: 2px solid #dc2626;"></div><span>Occupato</span></div>
        </div>
        
        <div class="parking-grid">
            <div class="loading" id="loading">Caricamento...</div>
            <table id="parkingTable" style="display: none;">
                <thead id="tableHead"></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>
    
    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Nuova Prenotazione</h2>
                <button class="close-modal" id="btnClose">&times;</button>
            </div>
            <form id="form" onsubmit="salva(event)">
                <input type="hidden" id="id">
                <div class="form-group">
                    <label>Ospite</label>
                    <input type="text" id="guest" required>
                </div>
                <div class="form-group">
                    <label>Posto</label>
                    <select id="spot" required></select>
                </div>
                <div class="form-group">
                    <label>Arrivo</label>
                    <input type="date" id="inDate" required>
                </div>
                <div class="form-group">
                    <label>Partenza</label>
                    <input type="date" id="outDate" required>
                </div>
                <div class="form-group">
                    <label>Targa</label>
                    <input type="text" id="plate">
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-danger" id="btnDel" style="display: none;">🗑️ Elimina</button>
                    <div>
                        <button type="button" class="btn btn-cancel" onclick="chiudi()">Annulla</button>
                        <button type="submit" class="btn btn-success">💾 Salva</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://nsettzmyswlfrnzwvpsq.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5zZXR0em15c3dsZnJuend2cHNxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjYwMzA0NzIsImV4cCI6MjA4MTYwNjQ3Mn0.OA2B7-6PVOi8XSaM5_r0Dxv_wpbG5I_ImTxaR0sgUoY';
        
        const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const spots = ['PK 1','PK 2','PK 3','PK 4','PK 5','PK 6','PK 7','PK 8','PK 9','PK 10','PK 11','PK 12','PK 13','PK 14','PK 15','PK 16','PK 17','PK 18','PK 19','PK 20','PK 21','PK 22','PK 23','PK 24','PK 25','PK 26','PK 27','PK H','NAVETTA','PK ESTERNI','BIDONI'];
        
        let data = [];
        let mese = new Date().getMonth();
        let anno = new Date().getFullYear();
        
        async function carica() {
            const {data: d, error} = await sb.from('reservations').select('*');
            if(error) { alert('Errore'); return; }
            data = d || [];
            console.log('✅ Caricate', data.length, 'prenotazioni');
            render();
        }
        
        function render() {
            const giorni = new Date(anno, mese+1, 0).getDate();
            const head = document.getElementById('tableHead');
            const body = document.getElementById('tableBody');
            
            let h = '<tr><th class="posto-header">Posto</th>';
            for(let g=1; g<=giorni; g++) {
                h += '<th>'+g+'</th>';
            }
            h += '</tr>';
            head.innerHTML = h;
            
            let b = '';
            spots.forEach(spot => {
                b += '<tr><td class="posto-header">'+spot+'</td>';
                
                for(let g=1; g<=giorni; g++) {
                    const m = String(mese+1).padStart(2,'0');
                    const gg = String(g).padStart(2,'0');
                    const date = anno+'-'+m+'-'+gg;
                    
                    // TROVA PRENOTAZIONE PER QUESTA CELLA
                    const res = data.find(r => {
                        const spotsInRes = r.spot.split(',').map(s => s.trim());
                        return spotsInRes.includes(spot) && date >= r.check_in_date && date < r.check_out_date;
                    });
                    
                    let cls = 'free';
                    let txt = '';
                    if(res) {
                        cls = 'occupied';
                        txt = '<div class="guest-name">'+res.guest_name+'</div>';
                    }
                    
                    b += '<td class="'+cls+'" onclick="cella(\''+spot+'\', \''+date+'\', '+res?.id+')">'+txt+'</td>';
                }
                b += '</tr>';
            });
            
            body.innerHTML = b;
            document.getElementById('loading').style.display = 'none';
            document.getElementById('parkingTable').style.display = 'table';
        }
        
        function cella(spot, date, resId) {
            if(resId) {
                const res = data.find(r => r.id === resId);
                apriModifica(res);
            } else {
                apriNuova(spot, date);
            }
        }
        
        function apriNuova(spot, date) {
            document.getElementById('modalTitle').textContent = 'Nuova Prenotazione';
            document.getElementById('id').value = '';
            document.getElementById('guest').value = '';
            document.getElementById('spot').value = spot;
            document.getElementById('inDate').value = date;
            document.getElementById('outDate').value = '';
            document.getElementById('plate').value = '';
            document.getElementById('btnDel').style.display = 'none';
            document.getElementById('modal').classList.add('active');
        }
        
        function apriModifica(res) {
            document.getElementById('modalTitle').textContent = 'Modifica Prenotazione';
            document.getElementById('id').value = res.id;
            document.getElementById('guest').value = res.guest_name;
            document.getElementById('spot').value = res.spot;
            document.getElementById('inDate').value = res.check_in_date;
            document.getElementById('outDate').value = res.check_out_date;
            document.getElementById('plate').value = res.license_plate || '';
            document.getElementById('btnDel').style.display = 'block';
            document.getElementById('modal').classList.add('active');
        }
        
        function chiudi() {
            document.getElementById('modal').classList.remove('active');
        }
        
        async function salva(e) {
            e.preventDefault();
            
            const id = document.getElementById('id').value;
            const obj = {
                guest_name: document.getElementById('guest').value,
                spot: document.getElementById('spot').value,
                check_in_date: document.getElementById('inDate').value,
                check_out_date: document.getElementById('outDate').value,
                license_plate: document.getElementById('plate').value || '',
                status: 'reserved'
            };
            
            if(obj.check_in_date >= obj.check_out_date) {
                alert('Data partenza deve essere dopo arrivo!');
                return;
            }
            
            let res;
            if(id) {
                delete obj.status;
                res = await sb.from('reservations').update(obj).eq('id', id);
            } else {
                res = await sb.from('reservations').insert([obj]);
            }
            
            if(res.error) {
                alert('Errore: '+res.error.message);
                return;
            }
            
            alert('✅ Salvato!');
            chiudi();
            carica();
        }
        
        async function elimina() {
            if(!confirm('Eliminare?')) return;
            const id = document.getElementById('id').value;
            await sb.from('reservations').delete().eq('id', id);
            alert('Eliminato!');
            chiudi();
            carica();
        }
        
        function init() {
            const m = document.getElementById('monthSelect');
            const months = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
            months.forEach((mm, i) => {
                const o = document.createElement('option');
                o.value = i;
                o.textContent = mm;
                m.appendChild(o);
            });
            
            const s = document.getElementById('spot');
            spots.forEach(sp => {
                const o = document.createElement('option');
                o.value = sp;
                o.textContent = sp;
                s.appendChild(o);
            });
            
            document.getElementById('monthSelect').value = mese;
            document.getElementById('monthSelect').addEventListener('change', () => {
                mese = parseInt(document.getElementById('monthSelect').value);
                render();
            });
            
            document.getElementById('yearSelect').addEventListener('change', () => {
                anno = parseInt(document.getElementById('yearSelect').value);
                render();
            });
            
            document.getElementById('btnNew').addEventListener('click', () => apriNuova('', ''));
            document.getElementById('btnClose').addEventListener('click', chiudi);
            document.getElementById('btnDel').addEventListener('click', elimina);
            
            carica();
            
            sb.channel('res').on('postgres_changes', {event:'*', schema:'public', table:'reservations'}, () => carica()).subscribe();
        }
        
        window.addEventListener('load', init);
    </script>
</body>
</html>
